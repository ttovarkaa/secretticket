<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С днем рождения, Рома</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --bg: #1c1a19;
    --dot: #2b2826;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    background-image: url('https://ttovarkaa.github.io/secretticket/bg.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    cursor: pointer;
    user-select: none;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart { color: #b9b3ff; }

  .ticket {
    position: absolute;
    width: min(82vw, 900px);
    height: auto;
    display: block;
    filter: drop-shadow(0 25px 40px rgba(0,0,0,0.6));
    opacity: 0;
    will-change: transform, opacity;
  }

  .ticket-top {
    transform: translate(-150vw, -40vh) rotate(-25deg) scale(0.6);
    top: 30%;
  }

  .ticket-bottom {
    transform: translate(150vw, 40vh) rotate(25deg) scale(0.6);
    top: 60%;
  }

  .stage.flown .ticket-top {
    opacity: 1;
    transform: translate(0, -42%) rotate(-4deg) scale(1);
  }

  .stage.flown .ticket-bottom {
    opacity: 1;
    transform: translate(0, -56%) rotate(3deg) scale(1);
  }

  .ticket-top, .ticket-bottom {
    transition:
      transform 1.4s cubic-bezier(0.16, 1, 0.3, 1),
      opacity 0.6s ease;
  }

  .stage.flown .ticket-top {
    transition-delay: 0s;
  }
  .stage.flown .ticket-bottom {
    transition-delay: 0.18s;
  }

  .signature {
    position: absolute;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    color: #cfcbe6;
    font-size: clamp(16px, 2.6vw, 26px);
    font-weight: 700;
    letter-spacing: 0.03em;
    opacity: 0;
    transition: opacity 1s ease 1.1s, transform 1s cubic-bezier(0.16,1,0.3,1) 1.1s;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    text-align: center;
  }

  .stage.flown .signature {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Mobile: show only the blue ticket, rotated to fill portrait screen */
  @media (max-width: 640px) {
    .ticket-top {
      display: none;
    }

    .ticket-bottom {
      width: 92vh;
      max-width: none;
      height: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg) scale(0.45);
      transform-origin: center center;
    }

    .stage.flown .ticket-bottom {
      opacity: 1;
      transform: translate(-50%, -50%) rotate(-90deg) scale(1);
    }

    .signature {
      display: none;
    }
  }

  /* Intro screen */
  .intro {
    position: fixed;
    inset: 0;
    background: #303030;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .intro.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .intro-text {
    color: #ffffff;
    font-size: clamp(28px, 7vw, 64px);
    font-weight: 800;
    letter-spacing: 0.04em;
    text-align: center;
    padding: 0 24px;
    transition: transform 0.15s ease;
  }

  .intro-text:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>
  <div class="intro" id="intro">
    <div class="intro-text" id="introText">нажми на экран</div>
  </div>

  <div class="stage" id="stage">
    <img class="ticket ticket-top" src="https://ttovarkaa.github.io/secretticket/white.png" alt="">
    <img class="ticket ticket-bottom" src="https://ttovarkaa.github.io/secretticket/blue.png" alt="">
    <div class="signature">С днем рождения, Рома <span class="heart">❤</span></div>
  </div>

<script>
  const stage = document.getElementById('stage');
  const intro = document.getElementById('intro');
  const introText = document.getElementById('introText');

  let taps = 0;

  function burstConfetti(x, y) {
    confetti({
      particleCount: 80,
      spread: 70,
      startVelocity: 45,
      origin: {
        x: x / window.innerWidth,
        y: y / window.innerHeight
      },
      colors: ['#ffffff', '#ffd700', '#ff6b6b', '#b9b3ff', '#ffffff']
    });
  }

  introText.addEventListener('click', (e) => {
    e.stopPropagation();
    taps++;
    burstConfetti(e.clientX, e.clientY);

    if (taps >= 3) {
      intro.classList.add('hidden');
      setTimeout(() => {
        stage.classList.add('flown');
      }, 300);
    }
  });

  // Allow toggling the tickets after the intro is gone
  let flown = true;
  document.body.addEventListener('click', (e) => {
    if (!intro.classList.contains('hidden')) return;
    flown = !flown;
    stage.classList.toggle('flown', flown);
  });
</script>
</body>
</html>
